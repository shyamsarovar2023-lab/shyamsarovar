<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Product Details</title>

    <link rel="stylesheet"
    href="product-details.css">

</head>

<body>




    <!-- NAVBAR -->
 <header>

    <div class="logo">
      <img src="SS lolo.jpeg" alt="shyam Sarovar Logo">

      <span>
        SHYAM SAROVAR
      </span>
    </div>
  </header>





    <!-- PRODUCT DETAILS -->

    <section class="details-section">




        <!-- IMAGE SLIDER -->

        <div class="image-box">

            <button
            class="slide-btn left"
            onclick="prevImage()">

                ❮

            </button>



            <img id="productImage">



            <button
            class="slide-btn right"
            onclick="nextImage()">

                ❯

            </button>

        </div>





        <!-- PRODUCT INFO -->

        <div class="details-box">

            <h1 id="productName"></h1>

            <h2 id="productPrice"></h2>

            <p id="productDescription"></p>

        </div>

    </section>





    <!-- RELATED PRODUCTS -->

    <section class="related-section">

        <h1>
            RELATED PRODUCTS
        </h1>

        <div class="related-products">

        </div>

    </section>





    <!-- FOOTER -->

    <footer>

        © 2026 SHYAM SAROVAR

    </footer>




    <script src="product-details.js"></script>

</body>
</html>
