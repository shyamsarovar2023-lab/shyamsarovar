  <!-- SEARCH SCRIPT -->

  <script>

    const brandSearch =
    document.getElementById("brandSearch");

    const brandCards =
    document.querySelectorAll(".brand-link");



    brandSearch.addEventListener("keyup", () => {

      const searchValue =
      brandSearch.value.toLowerCase();



      brandCards.forEach(card => {

        const brandName =
        card.innerText.toLowerCase();



        if(brandName.includes(searchValue)){

          card.style.display = "block";

        }

        else{

          card.style.display = "none";

        }

      });

    });

  </script>
